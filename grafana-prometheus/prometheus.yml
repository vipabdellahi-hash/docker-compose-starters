global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Uncomment to scrape your own app
  # - job_name: "my-app"
  #   static_configs:
  #     - targets: ["my-app:8000"]
